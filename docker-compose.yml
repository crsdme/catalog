services:
  postgres:
    image: postgres:16-alpine
    container_name: catalog-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-catalog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalog}
      POSTGRES_DB: ${POSTGRES_DB:-catalog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - catalog_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-catalog} -d ${POSTGRES_DB:-catalog}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: catalog-backend
    container_name: catalog-backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-catalog}:${POSTGRES_PASSWORD:-catalog}@postgres:5432/${POSTGRES_DB:-catalog}
      NODE_ENV: production
      PORT: 5000
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "node -e \"require('http').get('http://127.0.0.1:5000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - catalog_network
      - shared_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_BACKEND_URL: ''
    image: catalog-frontend
    container_name: catalog-frontend
    restart: always
    expose:
      - '80'
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shared_network
    labels:
      - traefik.enable=true
      - traefik.http.routers.catalog-frontend.rule=Host(`catalog.raw-hair-wholesale.com`)
      - traefik.http.routers.catalog-frontend.entrypoints=websecure
      - traefik.http.routers.catalog-frontend.tls.certresolver=letsencrypt
      - traefik.http.services.catalog-frontend.loadbalancer.server.port=80

networks:
  catalog_network:
    driver: bridge
  shared_network:
    external: true

volumes:
  postgres_data:
